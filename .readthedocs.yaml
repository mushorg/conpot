# Read the Docs configuration
# https://docs.readthedocs.com/platform/stable/config-file/v2.html
# https://docs.readthedocs.com/platform/stable/build-customization.html#install-dependencies-with-uv

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    # Native libs needed to build lxml, gevent, cryptography, etc.
    - libxml2-dev
    - libxslt1-dev
    - zlib1g-dev
    - libffi-dev
    - libssl-dev
    - libevent-dev
  jobs:
    install:
      - pip install --upgrade uv
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --link-mode=copy

sphinx:
  configuration: docs/source/conf.py
